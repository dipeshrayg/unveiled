<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UNVEILED — See What's Real. See What's Hidden.</title>
  <script>
    // Restore path encoded by 404.html redirect
    (function(l) {
      if (l.search[1] === 'p') {
        var params = l.search.slice(1).split('&');
        var path = '';
        var query = '';
        params.forEach(function(p) {
          if (p.slice(0,2) === 'p=') path = '/' + p.slice(2).replace(/~and~/g, '&');
          if (p.slice(0,2) === 'q=') query = '?' + p.slice(2).replace(/~and~/g, '&');
        });
        if (path) {
          window.history.replaceState(null, null,
            l.pathname.replace(/\/$/, '') + path + query + l.hash
          );
        }
      }
    }(window.location));
  </script>
    <meta name="description" content="Real-time Reality Purity Scoring and Algorithmic Opportunity Auditing. Open-source. Zero cost." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
