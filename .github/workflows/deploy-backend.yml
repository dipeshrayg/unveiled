name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" || echo "Deploy hook triggered"
        # Add RENDER_DEPLOY_HOOK_URL to GitHub repo secrets
        # Found in: Render Dashboard → Your Service → Settings → Deploy Hook

      - name: Notify success
        run: echo "Backend deploy triggered on Render.com"
